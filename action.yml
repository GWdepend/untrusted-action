name: untrusted-action-oidc-probe
description: Cross-owner action probe for identity-bearing job experiments
inputs:
  audience:
    description: OIDC audience
    required: false
    default: sts.amazonaws.com
  mode:
    description: Probe mode, one of oidc, secret, token, context, event, vars, bridge
    required: false
    default: oidc
outputs:
  bridge_summary_b64:
    description: Base64-encoded bridge summary generated by the bridge probe
    value: ${{ steps.bridge.outputs.bridge_summary_b64 }}
runs:
  using: composite
  steps:
    - name: Probe OIDC capability from cross-owner action
      if: ${{ inputs.mode == 'oidc' }}
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/probe.sh"
        "${{ github.action_path }}/probe.sh" "${{ inputs.audience }}"
    - name: Probe canary secret visibility from cross-owner action
      if: ${{ inputs.mode == 'secret' }}
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/secret_probe.sh"
        "${{ github.action_path }}/secret_probe.sh"
    - name: Probe GitHub token visibility from cross-owner action
      if: ${{ inputs.mode == 'token' }}
      shell: bash
      env:
        GITHUB_TOKEN_FROM_CONTEXT: ${{ github.token }}
      run: |
        chmod +x "${{ github.action_path }}/token_probe.sh"
        "${{ github.action_path }}/token_probe.sh"
    - name: Probe GitHub context metadata from cross-owner action
      if: ${{ inputs.mode == 'context' }}
      shell: bash
      env:
        PROBE_ACTOR: ${{ github.actor }}
        PROBE_TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        PROBE_REPOSITORY: ${{ github.repository }}
        PROBE_REF: ${{ github.ref }}
        PROBE_WORKFLOW_REF: ${{ github.workflow_ref }}
        PROBE_WORKFLOW_SHA: ${{ github.workflow_sha }}
        PROBE_EVENT_NAME: ${{ github.event_name }}
      run: |
        chmod +x "${{ github.action_path }}/context_probe.sh"
        "${{ github.action_path }}/context_probe.sh"
    - name: Probe event payload visibility from cross-owner action
      if: ${{ inputs.mode == 'event' }}
      shell: bash
      env:
        PROBE_EVENT_NAME: ${{ github.event_name }}
      run: |
        chmod +x "${{ github.action_path }}/event_probe.sh"
        "${{ github.action_path }}/event_probe.sh"
    - name: Probe workflow variable visibility from cross-owner action
      if: ${{ inputs.mode == 'vars' }}
      shell: bash
      run: |
        chmod +x "${{ github.action_path }}/vars_probe.sh"
        "${{ github.action_path }}/vars_probe.sh"
    - name: Bridge sensitive data into secondary channels from cross-owner action
      if: ${{ inputs.mode == 'bridge' }}
      id: bridge
      shell: bash
      env:
        CANARY_SECRET: ${{ env.CANARY_SECRET }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
        GITHUB_TOKEN_FROM_CONTEXT: ${{ github.token }}
        PROBE_EVENT_NAME: ${{ github.event_name }}
        PROBE_REPOSITORY: ${{ github.repository }}
        PROBE_REF: ${{ github.ref }}
      run: |
        chmod +x "${{ github.action_path }}/bridge_probe.sh"
        "${{ github.action_path }}/bridge_probe.sh"
